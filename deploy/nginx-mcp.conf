# Reverse proxy: TLS termination for the Project-Open MCP server.
# The MCP process listens on 127.0.0.1:8080; nginx exposes it over HTTPS.
#
# Streamable-HTTP / SSE notes:
#   - proxy_buffering off       -> stream events to the client immediately
#   - proxy_http_version 1.1    -> keep-alive for the event stream
#   - long read timeout         -> long-lived SSE connections must not be cut
#   - Authorization header is forwarded by default (pass-through Basic auth).

server {
    listen 443 ssl;
    http2 on;
    server_name mcp.soltea.it;   # <-- change to your hostname

    ssl_certificate     /etc/letsencrypt/live/mcp.soltea.it/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mcp.soltea.it/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # MCP endpoint (FastMCP mounts streamable HTTP at /mcp).
    location /mcp {
        proxy_pass http://127.0.0.1:8080;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

# Redirect plain HTTP to HTTPS.
server {
    listen 80;
    server_name mcp.soltea.it;   # <-- change to your hostname
    return 301 https://$host$request_uri;
}
